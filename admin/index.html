<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Yaaazz — Site admin (Decap CMS)</title>
  <!-- Replace with your GitHub OAuth App Client ID (see admin/SETUP.md). Required for /admin on GitHub Pages. -->
  <meta name="github-client-id" content="Ov23liKWWdow8xp9Azz4"/>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <style>
    .cms-preview-wrapper {
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 0 auto;
    }
    .cms-product-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }
    .cms-product-img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      margin-bottom: 20px;
      object-fit: cover;
      background: #f7f1dc;
    }
    .cms-product-title { margin: 0 0 8px 0; font-size: 24px; color: #7d4d5f; font-weight: 800; }
    .cms-product-subtitle { margin: 0 0 16px 0; color: #5f5c4d; font-size: 16px; }
    .cms-product-price { font-size: 20px; font-weight: 700; color: #2c673c; margin-bottom: 20px; }
    .cms-product-body { color: #312f23; line-height: 1.6; }
    .cms-empty { color: #a19d8c; font-style: italic; }
    
    /* Build Status Banner */
    #build-status {
      position: fixed;
      top: 15px;
      left: 50%;
      width: auto;
      white-space: nowrap;
      padding: 8px 18px;
      border-radius: 50px;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: translateX(-50%) translateY(-150%);
      pointer-events: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.12);
    }
    #build-status.visible {
      transform: translateX(-50%) translateY(0);
    }
    #build-status.building {
      background: #fdf6b2; /* Yellow */
      color: #723b10;
      border: 1px solid #fce96a;
    }
    #build-status.success {
      background: #def7ec; /* Green */
      color: #03543f;
      border: 1px solid #84e1bc;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .building .status-dot { background: #e3a008; animation: pulse 1.5s infinite; }
    .success .status-dot { background: #31c48d; }
    @keyframes pulse { 
      0% { opacity: 1; } 
      50% { opacity: 0.4; } 
      100% { opacity: 1; } 
    }
  </style>

  <script>
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
      window.CMS_ENV = "development";
      window.localStorage.setItem("netlifySiteId", "local");
    }

    // Custom Preview for Products
    const ProductPreview = createClass({
      render: function() {
        const entry = this.props.entry;
        const getAsset = this.props.getAsset;
        
        // Fields
        const title = entry.getIn(['data', 'title']) || 'New Product';
        const subtitle = entry.getIn(['data', 'subtitle']) || '';
        const price = entry.getIn(['data', 'price']);
        const salePrice = entry.getIn(['data', 'sale_price']);
        const body = this.props.widgetFor('body');
        
        // Handle images stored globally correctly
        let image = entry.getIn(['data', 'image']);
        let imgSrc = image ? getAsset(image).toString() : '';

        // Price formatting
        let displayPrice = '';
        if (salePrice) {
          displayPrice = `₱${salePrice} (Sale! Original: ₱${price})`;
        } else if (price !== undefined) {
          displayPrice = `₱${price}`;
        } else {
          displayPrice = 'Price not set';
        }

        return h('div', {className: 'cms-preview-wrapper'},
          h('div', {className: 'cms-product-card'},
            imgSrc ? h('img', {src: imgSrc, className: 'cms-product-img', alt: title}) : h('div', {className: 'cms-empty', style: {padding: '40px', background: '#f7f1dc', borderRadius: '12px', marginBottom: '20px', textAlign: 'center'}}, 'No image selected'),
            h('h1', {className: 'cms-product-title'}, title),
            subtitle ? h('p', {className: 'cms-product-subtitle'}, subtitle) : null,
            h('div', {className: 'cms-product-price'}, displayPrice),
            h('div', {className: 'cms-product-body'}, body || h('span', {className: 'cms-empty'}, 'Add a product description...'))
          )
        );
      }
    });

    CMS.registerPreviewTemplate("shop-products", ProductPreview);

    // BUILD STATUS TRACKER
    const REPO = "yaaazzcreativeco/Website";
    const statusEl = document.createElement('div');
    statusEl.id = 'build-status';
    document.body.appendChild(statusEl);

    async function checkBuildStatus() {
      try {
        // We try to fetch the latest workflow runs
        const response = await fetch(`https://api.github.com/repos/${REPO}/actions/runs?per_page=1`);
        const data = await response.json();
        
        if (data.workflow_runs && data.workflow_runs.length > 0) {
          const lastRun = data.workflow_runs[0];
          const status = lastRun.status; // in_progress, completed, etc.
          const conclusion = lastRun.conclusion; // success, failure, etc.

          if (status === 'in_progress' || status === 'queued') {
            statusEl.innerHTML = '<div class="status-dot"></div> Site is updating... (Changes will appear in 1-2 mins)';
            statusEl.className = 'visible building';
          } else if (status === 'completed' && conclusion === 'success') {
            // Show success for a few minutes after completion
            const completedAt = new Date(lastRun.updated_at).getTime();
            const now = new Date().getTime();
            if (now - completedAt < 120000) { // 2 minutes
              statusEl.innerHTML = '<div class="status-dot"></div> Changes are now LIVE!';
              statusEl.className = 'visible success';
            } else {
              statusEl.className = '';
            }
          } else {
            statusEl.className = '';
          }
        }
      } catch (e) {
        console.error("Build status check failed", e);
      }
    }

    // Poll every 15 seconds
    setInterval(checkBuildStatus, 15000);
    checkBuildStatus();
  </script>
</body>
</html>
